{% extends "base.html" %}

{% block content %}

<div class="container py-5">

    <h2 class="text-center mb-5">Meus Pedidos</h2>

    {% if pedidos %}

        <div class="row g-4">

            {% for pedido in pedidos %}

            <div class="col-12 col-md-6 col-lg-4">

                <div class="card shadow-sm p-3 h-100">

                    <h5>Pedido #{{ pedido.id }}</h5>

                    <p class="mb-1">
                        <strong>Total:</strong> R$ {{ "%.2f"|format(pedido.total) }}
                    </p>

                    <p class="mb-0 text-muted">
                        <strong>Data:</strong> {{ pedido.data }}
                    </p>

                </div>

            </div>

            {% endfor %}

        </div>

    {% else %}

        <p class="text-center">Você ainda não fez pedidos.</p>

    {% endif %}

</div>

{% endblock %}
