```html
<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>

        {% block titulo %}
        {% endblock %}

    </title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <!-- Fontes -->
    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

</head>

<body>

    <!-- HEADER -->
    <header>

        <nav class="navbar navbar-expand-md navbar-dark py-2">

            <div class="container-fluid">

                <!-- LOGO -->
                <a class="navbar-brand"
                   href="{{ url_for('home') }}">

                    <img
                        src="{{ url_for('static', filename='imagens/logo_lumiere.png') }}"
                        alt="Logo Lumiere"
                        class="logo-img">

                </a>

                <!-- BOTÃO MOBILE -->
                <button
                    class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#menu">

                    <span class="navbar-toggler-icon"></span>

                </button>


                <div class="collapse navbar-collapse"
                     id="menu">

                    <!-- BUSCA -->
                    <form
                        class="search-bar mx-auto"
                        action="{{ url_for('catalogo') }}"
                        method="GET"
                        role="search">

                        <span class="search-icon">

                            <i class="bi bi-search"></i>

                        </span>

                        <input
                            type="search"
                            name="busca"
                            placeholder="Buscar produto"
                            value="{{ request.args.get('busca','') }}"
                            aria-label="Buscar">

                    </form>


                    <!-- MENU -->
                    <ul class="navbar-nav ms-auto align-items-center gap-3">

                        <!-- HOME -->
                        <li class="nav-item">

                            <a class="nav-link"
                               href="{{ url_for('home') }}">

                                Home

                            </a>

                        </li>


                        <!-- CATÁLOGO -->
                        <li class="nav-item">

                            <a class="nav-link"
                               href="{{ url_for('catalogo') }}">

                                Catálogo

                            </a>

                        </li>


                        <!-- CARRINHO -->
                        <li class="nav-item">

                            <a class="nav-link"
                               href="{{ url_for('carrinho') }}">

                                <i class="bi bi-cart"></i>

                            </a>

                        </li>


                        {% if session.get("usuario_id") %}

                        <!-- PERFIL -->
                        <li class="nav-item">

                            <a class="nav-link"
                               href="{{ url_for('perfil') }}">

                                <i class="bi bi-person-circle"></i>

                                {{ session["nome"] }}

                            </a>

                        </li>


                        <!-- SAIR -->
                        <li class="nav-item">

                            <a class="nav-link"
                               href="{{ url_for('logout') }}">

                                Sair

                            </a>

                        </li>

                        {% else %}

                        <!-- LOGIN -->
                        <li class="nav-item">

                            <a class="nav-link"
                               href="{{ url_for('login') }}">

                                Entrar

                            </a>

                        </li>


                        <!-- CADASTRO -->
                        <li class="nav-item">

                            <a class="nav-link"
                               href="{{ url_for('cadastro') }}">

                                Cadastro

                            </a>

                        </li>

                        {% endif %}

                    </ul>

                </div>

            </div>

        </nav>

    </header>


    <!-- CONTEÚDO -->
    <main>

        {% block content %}
        {% endblock %}

    </main>


    <!-- FOOTER -->
    <footer class="footer-custom">

        <div class="social-container">

            <a href="#"
               class="social-item">

                <i class="bi bi-instagram"></i>
                <span>@lumiere.official</span>

            </a>


            <a href="#"
               class="social-item">

                <i class="bi bi-facebook"></i>
                <span>@lumiere.official</span>

            </a>


            <a href="#"
               class="social-item">

                <i class="bi bi-youtube"></i>
                <span>@lumiere.official</span>

            </a>

        </div>

    </footer>


    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

</body>

</html>
```
