<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        {% block titulo %}
        {% endblock %}
    </title>

    <!-- Bibliotecas e estilos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- Header -->
    <header>

        <nav class="navbar navbar-expand-md navbar-dark py-2">

            <div class="container-fluid">

                <!-- Logo -->
                <a class="navbar-brand" href="{{ url_for('home') }}">

                    <img src="{{ url_for('static', filename='imagens/logo_lumiere.png') }}" alt="Logo Lumiere"
                        class="logo-img">

                </a>

                <!-- Menu mobile -->
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">

                    <span class="navbar-toggler-icon"></span>

                </button>

                <div class="collapse navbar-collapse" id="menu">

                    <!-- Barra de busca -->
                    <form class="search-bar mx-auto" action="#" method="GET" role="search">

                        <span class="search-icon">
                            <i class="bi bi-search"></i>
                        </span>

                        <input type="search" name="busca" placeholder="busca" aria-label="Buscar">

                    </form>

                    <!-- Navegação -->
                    <ul class="navbar-nav ms-auto align-items-center gap-3">

                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('home') }}">

                                Home

                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('catalogo') }}">

                                Catálogo

                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('login') }}">

                                Login

                            </a>
                        </li>

                    </ul>

                </div>

            </div>

        </nav>

    </header>

    <!-- Conteúdo principal -->
    <main>

        {% block content %}
        {% endblock %}

    </main>

    <!-- Footer -->
    <footer class="footer-custom">

        <div class="social-container">

            <a href="#" class="social-item">

                <i class="bi bi-instagram"></i>
                <span>@lumiere.official</span>

            </a>

            <a href="#" class="social-item">

                <i class="bi bi-facebook"></i>
                <span>@lumiere.official</span>

            </a>

            <a href="#" class="social-item">

                <i class="bi bi-youtube"></i>
                <span>@lumiere.official</span>

            </a>

        </div>

    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

</body>

</html>
