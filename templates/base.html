<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <header>
        <nav class="navbar navbar-expand-md navbar-dark bg-black py-1">
            <div class="container-fluid py-3">

                <!-- Logo + Nome -->
                <a class="navbar-brand d-flex align-items-center " href="#">
                    <img src="{{ url_for('static', filename='imagens/logo-keyframe.png') }}" alt="Logo"
                        class="logo-img">
                    <div>
                        <div class="fw-light text-white" style="font-size: 14px;">Universidade</div>
                        <div class="fw-bold text-white" style="font-size: 20px;">Studio Keyframe</div>
                    </div>
                </a>

                <!-- Botão hambúrguer -->
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <!-- Menu -->
                <div class="collapse navbar-collapse" id="menu">
                    <ul class="navbar-nav ms-auto align-items-center">
                        <ul class="navbar-nav ms-auto align-items-center">
                            <li class="nav-item">
                                <a class="nav-link" href="{{ url_for('home') }}">Home</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="{{ url_for('sobre') }}">Sobre</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="{{ url_for('contato') }}">Contato</a>
                            </li>
                        </ul>
                    </ul>
                </div>

            </div>
        </nav>
    </header>


    <main>
        {% block content %}
        {% endblock %}
    </main>


    <footer class="bg-black text-center p-4">
        <p class="mb-0">&copy; Studio Keyframe. Todos os direitos reservados</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
