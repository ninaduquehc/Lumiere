{% extends "base.html" %}

{% block titulo %}/Ítem{% endblock %}

{% block content %}

<section class="produto-section">

    <div class="produto-container">

        <!-- IMAGEM -->
        <div class="produto-imagem">

            <img src="{{ url_for('static', filename=produto.imagem) }}" alt="{{ produto.nome }}">

        </div>

        <!-- INFO -->
        <div class="produto-info">

            <div>

                <h1 class="produto-subtitulo">
                    {{ produto.descricao }}
                </h1>

                <p class="produto-preco">
                    R$ {{ produto.preco }}
                </p>

            </div>

            <!-- OPÇÕES -->
            <div class="produto-opcoes">

                <div class="opcao-box">

                    <label for="tamanho">TAMANHO:</label>

                    <select id="tamanho" class="select-estilizado">
                        <option>Selecionar...</option>
                        <option>XP</option>
                        <option>PP</option>
                        <option>P</option>
                        <option>M</option>
                        <option>G</option>
                        <option>GG</option>
                        <option>XG</option>
                    </select>

                </div>

            </div>

            <!-- CARRINHO -->
            <form action="{{ url_for('adicionar_carrinho', id_produto=produto.id) }}" method="POST">

                <button type="submit" class="btn-carrinho">

                    <i class="bi bi-cart-plus"></i>
                    Adicionar ao carrinho

                </button>

            </form>

        </div>

    </div>

</section>


<!-- RELACIONADOS -->
<section class="relacionados">

    <h2 class="relacionados-titulo">
        PRODUTOS RELACIONADOS
    </h2>

    <div class="relacionados-grid">

        {% for relacionado in produtos %}

        <a href="{{ url_for('item', id_produto=relacionado.id) }}" class="relacionado-item">

            <img src="{{ url_for('static', filename=relacionado.imagem) }}" alt="{{ relacionado.nome }}">

        </a>

        {% endfor %}

    </div>

</section>

{% endblock %}
